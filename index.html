<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/index.css" />
    <script defer type="module" src="js/auth.js"></script>
    <script defer type="module" src="js/index.js"></script>
    <title>login</title>
  </head>
  <body>
    <header>
      <h1>就活応援サイトへようこそ！</h1>
      <h2>ログインページ</h2>
      <p>
        自分の就活活動情報を一元管理、瞬時に確認することができます！<br />
        自分の就活に行ったイベントや企業を記録しよう！
      </p>
    </header>

    <main>
      <button id="loginGoogle">
        <img
          src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/google.svg"
          width="20"
          height="20"
          alt="Google"
        />
        Googleでログイン
      </button>

      <button id="loginGithub">
        <img
          src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/github.svg"
          width="20"
          height="20"
          alt="GitHub"
          style="filter: invert(1)"
        />
        GitHubでログイン
      </button>
    </main>
  </body>
</html>
