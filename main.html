<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer type="module" src="js/auth.js"></script>
    <script defer type="module" src="js/main.js"></script>
    <title>main</title>
  </head>
  <body>
    <header>
      <h1>就活応援サイト</h1>
      <br />
      <button id="logout">ログアウト</button>
    </header>
    <main>
      <article id="registPage">
        <form id="recordForm">
          <section>
            <label for="date">活動日：</label>
            <input type="date" id="date" name="date" required />
          </section>

          <section>
            <label for="dayNum">活動日数：</label>
            <input type="number" id="dayNum" name="dayNum" required />
          </section>

          <section>
            <label for="company">企業名 or イベント名:</label>
            <input type="text" id="company" name="company" required />
          </section>

          <section>
            <label for="place">実施場所：</label>
            <input type="text" id="place" name="place" required />
          </section>

          <section>
            <label for="doing">活動内容：</label>
            <!-- 1: インターン, 2: インターン選考, 3: オープンカンパニー, 4: 個別説明会, 5: 合同説明会, 6: 選考or受験, 7: 内定, 8: 内定後の集まり, 9: その他 -->
            <select id="doing" name="doing" required>
              <option value="">選択してください</option>
              <option value="1">インターン</option>
              <option value="2">インターン選考</option>
              <option value="3">オープンカンパニー</option>
              <option value="4">個別説明会</option>
              <option value="5">合同説明会</option>
              <option value="6">選考or受験</option>
              <option value="7">内定</option>
              <option value="8">
                内定後の集まり（面談、懇親会、内定式、研修等）
              </option>
              <option value="9">その他</option>
            </select>
            <input
              type="text"
              id="doingOther"
              name="doingOther"
              style="display: none"
              placeholder="その他の活動内容を入力してください"
            />
          </section>

          <section id="testarea" style="display: none">
            <label for="test">試験内容：</label>
            <!-- 1: 筆記試験, 2: 面接試験, 3: グループワーク, 4: その他 -->
            <select id="test" name="test">
              <option value="">選択してください</option>
              <option value="1">筆記試験</option>
              <option value="2">面接試験</option>
              <option value="3">グループワーク</option>
              <option value="4">その他</option>
            </select>
            <input
              type="text"
              id="testOther"
              name="testOther"
              style="display: none"
              placeholder="その他の試験内容を入力してください"
            />
          </section>

          <section>
            <input type="submit" value="登録" />
          </section>
        </form>
      </article>

      <article id="viewPage">
        <h2>就活情報一覧</h2>
        <table>
          <thead>
            <tr>
              <th>活動日</th>
              <th>活動日数</th>
              <th>企業名 or イベント名</th>
              <th>実施場所</th>
              <th>活動内容</th>
              <th>試験内容</th>
              <th>その他の活動内容</th>
              <th>その他の試験内容</th>
              <th>削除操作</th>
            </tr>
          </thead>
          <tbody id="infoTableBody">
            <!-- 就活情報がここに表示される -->
          </tbody>
        </table>
      </article>
    </main>
  </body>
</html>
